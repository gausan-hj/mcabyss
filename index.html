<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水蓝服务器官网</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#6dd5fa,#2980b9);
  color:white;
}

/* 布丁菜单 */
.menu{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  background:rgba(255,255,255,0.2);
  border-radius:50px;
  padding:5px;
  backdrop-filter:blur(10px);
}

.menu button{
  background:none;
  border:none;
  color:white;
  padding:10px 20px;
  cursor:pointer;
  font-size:10px;
  position:relative;
  z-index:2;
}

.indicator{
  position:absolute;
  height:100%;
  width:80px;
  background:white;
  border-radius:50px;
  transition:0.4s;
  z-index:1;
  left:0;
}

.swiper{
  width:100vw;
  height:100vh;
}

.swiper-slide{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.panel{
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:15px;
  margin:10px;
  font-size:10px;
  width:320px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button.action{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 布丁菜单 -->
<div class="menu">
  <div class="indicator" id="indicator"></div>
  <button onclick="goTo(0)">主页</button>
  <button onclick="goTo(1)">资讯</button>
  <button onclick="goTo(2)">规则</button>
  <button onclick="goTo(3)">UUID</button>
  <button onclick="goTo(4)">联系</button>
</div>

<div class="swiper">
  <div class="swiper-wrapper">

    <!-- 主页 -->
    <div class="swiper-slide">
      <h3>服务器状态</h3>
      <div class="panel" id="statusBox">加载中...</div>
    </div>

    <!-- 资讯 -->
    <div class="swiper-slide">
      <h3>Java 版</h3>
      <div class="panel">
        IP: play.example.com<br>
        端口: 25565
      </div>

      <h3>基岩版</h3>
      <div class="panel">
        IP: bedrock.example.com<br>
        端口: 19132
      </div>
    </div>

    <!-- 规则 -->
    <div class="swiper-slide">
      <h3>服务器规则</h3>
      <div class="panel">
        禁止外挂<br>
        禁止破坏<br>
        尊重玩家
      </div>
    </div>

    <!-- UUID 页面 -->
    <div class="swiper-slide">
      <h3>查询玩家 UUID</h3>
      <input type="text" id="playerName" placeholder="输入玩家名">
      <button class="action" onclick="getUUID()">查询</button>
      <div class="panel" id="uuidResult"></div>
    </div>

    <!-- 联系 -->
    <div class="swiper-slide">
      <h3>联系我们</h3>
      <div class="panel">
        QQ群: 123456<br>
        Discord: yourserver
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper',{
  direction:'horizontal'
});

function goTo(index){
  swiper.slideTo(index);
  document.getElementById("indicator").style.left = index*80+"px";
}

/* 服务器状态 */
fetch("https://api.mcsrvstat.us/2/mcabyss.xyz")
.then(res=>res.json())
.then(data=>{
  if(data.online){
    document.getElementById("statusBox").innerHTML =
    "在线 🟢<br>玩家: "+data.players.online+"/"+data.players.max+
    "<br>版本: "+data.version;
  }else{
    document.getElementById("statusBox").innerHTML = "服务器离线 🔴";
  }
});

/* UUID 查询 */
function getUUID(){
  const name = document.getElementById("playerName").value;
  fetch("https://api.mojang.com/users/profiles/minecraft/"+name)
  .then(res=>res.json())
  .then(data=>{
    if(data.id){
      document.getElementById("uuidResult").innerHTML =
      "玩家: "+data.name+"<br>UUID: "+data.id;
    }else{
      document.getElementById("uuidResult").innerHTML =
      "找不到玩家";
    }
  });
}
</script>

</body>
</html>
