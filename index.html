<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Abyss 官网</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#6dd5fa,#2980b9);
  color:white;
  overflow:hidden;
}

/* ===== 布丁菜单 ===== */

.menu{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  background:rgba(255,255,255,0.2);
  border-radius:50px;
  padding:5px;
  backdrop-filter:blur(10px);
  z-index:9999;
}

.menu button{
  background:none;
  border:none;
  color:white;
  padding:10px 20px;
  cursor:pointer;
  font-size:10px;
  position:relative;
}

.indicator{
  position:absolute;
  top:5px;
  left:5px;
  height:35px;
  background:white;
  border-radius:50px;
  transition:all 0.4s ease;
  z-index:-1;
}

/* ===== 页面 ===== */

.swiper{
  width:100vw;
  height:100vh;
}

.swiper-slide{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.panel{
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:15px;
  margin:10px;
  font-size:10px;
  width:320px;
}
</style>
</head>

<body>

<!-- 菜单 -->
<div class="menu" id="menu">
  <div class="indicator" id="indicator"></div>
  <button>主页</button>
  <button>资讯</button>
  <button>规则</button>
  <button>UUID</button>
  <button>联系</button>
</div>

<div class="swiper">
  <div class="swiper-wrapper">

    <!-- 主页 -->
    <div class="swiper-slide">
      <h3>服务器状态</h3>
      <div class="panel" id="statusBox">加载中...</div>
    </div>

    <!-- 资讯 -->
    <div class="swiper-slide">
      <h3>Java 版</h3>
      <div class="panel">
        IP: mcabyss.xyz<br>
        备用: winter.mcproxy.net<br>
        版本: 1.21.4
      </div>

      <h3>基岩版</h3>
      <div class="panel">
        IP: mcabyss.xyz<br>
        端口: 10138<br>
        版本: 最新
      </div>
    </div>

    <!-- 规则 -->
    <div class="swiper-slide">
      <h3>服务器规则</h3>
      <div class="panel">
        禁止外挂<br>
        禁止破坏<br>
        尊重玩家
      </div>
    </div>

    <!-- UUID -->
    <div class="swiper-slide">
      <h3>查询 UUID</h3>
      <input type="text" id="playerName" placeholder="输入玩家名">
      <button onclick="getUUID()">查询</button>
      <div class="panel" id="uuidResult"></div>
    </div>

    <!-- 联系 -->
    <div class="swiper-slide">
      <h3>联系我们</h3>
      <div class="panel">
        QQ群: 你的QQ群<br>
        Discord: 你的Discord
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper',{
  direction:'horizontal',
  speed:600
});

/* ===== 修复的菜单动画 ===== */

const buttons = document.querySelectorAll(".menu button");
const indicator = document.getElementById("indicator");

function moveIndicator(index){
  const btn = buttons[index];
  indicator.style.width = btn.offsetWidth + "px";
  indicator.style.left = btn.offsetLeft + "px";
}

buttons.forEach((btn,index)=>{
  btn.addEventListener("click",()=>{
    swiper.slideTo(index);
    moveIndicator(index);
  });
});

/* 滑动时同步 */
swiper.on("slideChange",()=>{
  moveIndicator(swiper.activeIndex);
});

/* 初始化 */
window.onload = ()=> moveIndicator(0);

/* ===== 服务器状态 ===== */
fetch("https://api.mcsrvstat.us/2/mcabyss.xyz")
.then(res=>res.json())
.then(data=>{
  if(data.online){
    document.getElementById("statusBox").innerHTML =
    "在线 🟢<br>玩家: "+data.players.online+"/"+data.players.max+
    "<br>版本: "+data.version;
  }else{
    document.getElementById("statusBox").innerHTML =
    "服务器离线 🔴";
  }
});

/* ===== UUID 查询 ===== */
function getUUID(){
  const name = document.getElementById("playerName").value;
  fetch("https://api.mojang.com/users/profiles/minecraft/"+name)
  .then(res=>res.json())
  .then(data=>{
    if(data.id){
      document.getElementById("uuidResult").innerHTML =
      "玩家: "+data.name+"<br>UUID: "+data.id;
    }else{
      document.getElementById("uuidResult").innerHTML =
      "找不到玩家";
    }
  });
}
</script>

</body>
</html>
