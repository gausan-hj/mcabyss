<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务器官网</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Press Start 2P', cursive;
  background: #87CEFA;
}

.swiper {
  width: 100vw;
  height: 100vh;
}

.swiper-slide {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 20px;
}

.home, .info {
  background: linear-gradient(135deg, #6dd5fa, #2980b9);
}

.rules {
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}

.contact {
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
}

h1 {
  font-size: 24px;
  margin-bottom: 30px;
}

/* 信息面板 */
.server-panel {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  border: 3px solid white;
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
  font-size: 10px;
}

.status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: lime;
  box-shadow: 0 0 10px lime;
}

.info-text {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <!-- 主页 -->
    <div class="swiper-slide home">
      <h1>服务器状态</h1>

      <div class="server-panel">
        <div class="status">
          <span>Java版</span>
          <div class="dot"></div>
        </div>

        <div class="status">
          <span>基岩版</span>
          <div class="dot"></div>
        </div>

        <div class="info-text">在线玩家: 56 / 200</div>
        <div class="info-text">版本: 1.20.x</div>
        <div class="info-text">MOTD: 欢迎来到水蓝世界</div>
      </div>
    </div>

    <!-- 信息 -->
    <div class="swiper-slide info">
      <h1>服务器信息</h1>

      <div class="server-panel">
        <div class="info-text">服务器IP:</div>
        <div class="info-text">play.yourserver.com</div>

        <div class="info-text">基岩端口: 19132</div>
        <div class="info-text">支持 Java × 基岩</div>
      </div>
    </div>

    <!-- 规则 -->
    <div class="swiper-slide rules">
      <h1>服务器规则</h1>
      <p style="font-size:12px">
        1. 禁止外挂<br>
        2. 禁止破坏他人建筑<br>
        3. 尊重玩家
      </p>
    </div>

    <!-- 联系 -->
    <div class="swiper-slide contact">
      <h1>联系我们</h1>
      <p style="font-size:12px">
        QQ群: 123456<br>
        Discord: yourserver<br>
        Email: admin@server.com
      </p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  mousewheel: true,
});
</script>

</body>
</html>
