<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水蓝服务器官网</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  font-family: 'Press Start 2P', cursive;
  background: #6dd5fa;
}

.swiper {
  width: 100vw;
  height: 100vh;
}

.swiper-slide {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 20px;
}

.home, .info {
  background: linear-gradient(135deg, #6dd5fa, #2980b9);
}

.rules {
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}

.contact {
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
}

.server-panel {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  border: 3px solid white;
  font-size: 10px;
}

.status-row {
  margin-bottom: 12px;
}

.team {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  font-size: 10px;
}

.nav {
  position: fixed;
  bottom: 10px;
  display: flex;
  gap: 10px;
}

.nav button {
  padding: 10px;
  font-size: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <!-- 主页 -->
    <div class="swiper-slide home">
      <h3>服务器状态</h3>
      <div class="server-panel">
        <div class="status-row" id="status">加载中...</div>
        <div class="status-row" id="players"></div>
        <div class="status-row" id="version"></div>
        <div class="status-row" id="motd"></div>
      </div>
    </div>

    <!-- 信息 -->
    <div class="swiper-slide info">
      <h3>服务器信息</h3>

      <div class="server-panel">
        <div class="status-row">IP: play.yourserver.com</div>
        <div class="status-row">基岩端口: 19132</div>
        <div class="status-row">支持 Java × 基岩</div>
      </div>

      <h3 style="margin-top:30px;">团队成员</h3>
      <div class="team">
        <div>成员1</div>
        <div>成员2</div>
        <div>成员3</div>
        <div>成员4</div>
        <div>成员5</div>
        <div>成员6</div>
        <div>成员7</div>
      </div>
    </div>

    <!-- 规则 -->
    <div class="swiper-slide rules">
      <h3>服务器规则</h3>
      <p style="font-size:10px">
        1. 禁止外挂<br>
        2. 禁止破坏<br>
        3. 尊重玩家
      </p>
    </div>

    <!-- 联系 -->
    <div class="swiper-slide contact">
      <h3>联系我们</h3>
      <p style="font-size:10px">
        QQ群: 123456<br>
        Discord: yourserver<br>
        Email: admin@server.com
      </p>
    </div>

  </div>
</div>

<!-- 底部导航 -->
<div class="nav">
  <button onclick="swiper.slideTo(0)">主页</button>
  <button onclick="swiper.slideTo(1)">信息</button>
  <button onclick="swiper.slideTo(2)">规则</button>
  <button onclick="swiper.slideTo(3)">联系</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  mousewheel: true,
});

const serverIP = "play.yourserver.com"; // ← 改成你的IP

fetch(`https://api.mcsrvstat.us/2/${serverIP}`)
  .then(res => res.json())
  .then(data => {
    if(data.online){
      document.getElementById("status").innerText = "状态: 在线 🟢";
      document.getElementById("players").innerText =
        "在线玩家: " + data.players.online + "/" + data.players.max;
      document.getElementById("version").innerText =
        "版本: " + data.version;
      document.getElementById("motd").innerText =
        "MOTD: " + (data.motd.clean ? data.motd.clean.join(" ") : "");
    } else {
      document.getElementById("status").innerText = "状态: 离线 🔴";
    }
  });
</script>

</body>
</html>
